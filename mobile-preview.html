<!DOCTYPE html>
<html lang="en">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E9QBRD59GR"></script>
  <script>
    window.dataLayer = window.dataLayer || [];

    gtag('config', 'G-E9QBRD59GR');

  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CADA — Mobile preview</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #1a2a32 0%, #0f1419 100%);
      color: #e8f7fa;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
    }
    h1 { font-size: 1.125rem; font-weight: 600; margin: 0 0 0.25rem; }
    p { margin: 0 0 1.25rem; font-size: 0.875rem; opacity: 0.75; text-align: center; max-width: 28rem; }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.25rem;
    }
    .toolbar a, .toolbar button {
      font-size: 0.8125rem;
      font-weight: 600;
      padding: 0.5rem 0.875rem;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      text-decoration: none;
      cursor: pointer;
    }
    .toolbar a:hover, .toolbar button:hover { background: rgba(28,176,200,0.35); border-color: #1CB0C8; }
    .toolbar a.active { background: #1CB0C8; border-color: #1CB0C8; color: #fff; }
    .phone-wrap { position: relative; padding: 12px; background: #2b2b2b; border-radius: 44px; box-shadow: 0 24px 64px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.06); }
    .phone-notch {
      width: 96px; height: 24px; background: #2b2b2b; border-radius: 0 0 14px 14px;
      margin: 0 auto -12px; position: relative; z-index: 2;
    }
    .phone-screen {
      width: 390px; height: 844px; max-width: calc(100vw - 2rem); max-height: calc(100vh - 12rem);
      border: none; border-radius: 32px; background: #fff; display: block;
    }
    .label { margin-top: 0.75rem; font-size: 0.75rem; opacity: 0.5; }
    @media (max-width: 420px) {
      .phone-screen { width: 100%; height: 70vh; }
    }
  </style>
</head>
<body>
  <h1>CADA mobile preview</h1>
  <p>iPhone 14 Pro size (390×844). Use the links below to switch pages. On a real phone, open the same URLs directly.</p>
  <div class="toolbar" id="toolbar">
    <a href="#" data-src="index.html" class="active">Home</a>
    <a href="#" data-src="cada_partnerships_page/code.html">Partnerships</a>
    <a href="#" data-src="cada_creators_page/code.html">Influencers</a>
    <button type="button" id="reload">Reload</button>
  </div>
  <div class="phone-wrap">
    <div class="phone-notch" aria-hidden="true"></div>
    <iframe id="preview" class="phone-screen" src="index.html" title="CADA mobile preview"></iframe>
  </div>
  <p class="label">Tip: tap ☰ in the preview to test mobile navigation</p>
  <script>
    var frame = document.getElementById('preview');
    var toolbar = document.getElementById('toolbar');
    toolbar.addEventListener('click', function (e) {
      var link = e.target.closest('[data-src]');
      if (!link) return;
      e.preventDefault();
      toolbar.querySelectorAll('[data-src]').forEach(function (a) { a.classList.remove('active'); });
      link.classList.add('active');
      frame.src = link.getAttribute('data-src');
    });
    document.getElementById('reload').addEventListener('click', function () {
      frame.src = frame.src;
    });
  </script>
</body>
</html>
